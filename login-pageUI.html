<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page UI</title>
    <link rel="stylesheet" href="login-pageUI.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

</head>
<body>

    <!--Login Page UI-->
    <div class="Login-card">
        <div class="icon">
            <!--User-Icon-->
            <svg  xmlns="http://www.w3.org/2000/svg" width="140" height="140"  
fill="#ffffff" viewBox="0 0 24 24" >
<!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
<path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"></path>
</svg>
        </div>

        <div class="user field">
            <!--Name-Field-->
            <label for="username">Username</label>
            <input type="text" id="username" value="Username" placeholder="Username" required >

        </div>
        <div class="pass field">
            <!--Password-Field-->
            <label for="password">Password</label>
            <input type="password" id="password" value="Password" placeholder="Password" required >


        </div>
            <!--Login-Button-->
            <button type="submit" id="login-btn">Login</button>
    
    </div>
    
</body>
</html>
